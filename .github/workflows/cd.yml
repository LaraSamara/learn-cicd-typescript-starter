name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: numeric-lead-490020-t0

      - name: Build and push Docker image
        run: gcloud builds submit --region=us-central1 --tag us-central1-docker.pkg.dev/numeric-lead-490020-t0/notely-ar-repo/notely:latest .

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image us-central1-docker.pkg.dev/numeric-lead-490020-t0/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project numeric-lead-490020-t0 --max-instances=4
